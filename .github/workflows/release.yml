name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  binaries:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - arm-unknown-linux-gnueabihf
          - arm-unknown-linux-musleabihf
          - armv7-unknown-linux-gnueabihf
          - armv7-unknown-linux-musleabihf
          # mips (tier 3, built from source via build-std)
          - mips-unknown-linux-gnu
          - mipsel-unknown-linux-gnu
          - mips64-unknown-linux-gnuabi64
          - mips64el-unknown-linux-gnuabi64
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Guard getrandom on 0.2.x (MIPS build needs it)
        run: |
          v=$(cargo tree -i getrandom 2>/dev/null | head -1)
          echo "$v"
          echo "$v" | grep -q 'getrandom v0\.2\.' || { echo "getrandom drifted off 0.2.x; MIPS build will break"; exit 1; }

      - name: Build
        env:
          RUSTFLAGS: '-Zlocation-detail=none -Zfmt-debug=none -Zunstable-options -Cpanic=immediate-abort -Cforce-unwind-tables=no --cfg curve25519_dalek_backend="serial"'
        run: |
          cross build --release --locked \
            -Zbuild-std=std,panic_abort -Zbuild-std-features=optimize_for_size \
            --target ${{ matrix.target }}

      - name: Package
        run: install -D "target/${{ matrix.target }}/release/zeronat" "out/zeronat"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: out/zeronat
          if-no-files-found: error

  freebsd:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-freebsd
          - aarch64-unknown-freebsd
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      # zig 0.16 ships the FreeBSD system-library stubs (execinfo, kvm, ...) that
      # std links; older zig fails to find them at link time.
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build
        env:
          RUSTFLAGS: '-Zlocation-detail=none -Zfmt-debug=none -Zunstable-options -Cpanic=immediate-abort -Cforce-unwind-tables=no --cfg curve25519_dalek_backend="serial"'
        run: |
          cargo zigbuild --release --locked \
            -Zbuild-std=std,panic_abort -Zbuild-std-features=optimize_for_size \
            --target ${{ matrix.target }}

      - name: Package
        run: install -D "target/${{ matrix.target }}/release/zeronat" "out/zeronat"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: out/zeronat
          if-no-files-found: error

  windows:
    # Temporarily disabled. Re-enable: drop `if: false` and add `windows` back to release.needs.
    if: false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install clang and lld
        run: sudo apt-get update && sudo apt-get install -y clang llvm lld

      - name: Install cargo-xwin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-xwin

      # Windows requires unwind tables, so -Cforce-unwind-tables=no is omitted here.
      - name: Build
        env:
          XWIN_ACCEPT_LICENSE: "1"
          RUSTFLAGS: '-Zlocation-detail=none -Zfmt-debug=none -Zunstable-options -Cpanic=immediate-abort --cfg curve25519_dalek_backend="serial"'
        run: |
          cargo xwin build --release --locked \
            -Zbuild-std=std,panic_abort -Zbuild-std-features=optimize_for_size \
            --target ${{ matrix.target }}

      - name: Package
        run: install -D "target/${{ matrix.target }}/release/zeronat.exe" "out/zeronat.exe"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.target }}
          path: out/zeronat.exe
          if-no-files-found: error

  release:
    needs: [binaries, freebsd]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: bin-*
      - name: Collect per-target binaries
        run: |
          mkdir -p out
          for d in artifacts/bin-*; do
            name="${d#artifacts/bin-}"
            if [ -f "$d/zeronat.exe" ]; then
              install -m 0755 "$d/zeronat.exe" "out/zeronat-${name}.exe"
            else
              install -m 0755 "$d/zeronat" "out/zeronat-${name}"
            fi
          done
      - uses: softprops/action-gh-release@v3
        with:
          files: out/zeronat-*

  docker:
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Docker platform -> static musl target. scratch images COPY a prebuilt
      # binary, so no emulation is needed to assemble them.
      - uses: actions/download-artifact@v8
        with: { name: bin-x86_64-unknown-linux-musl, path: dist/linux/amd64 }
      - uses: actions/download-artifact@v8
        with: { name: bin-aarch64-unknown-linux-musl, path: dist/linux/arm64 }
      - uses: actions/download-artifact@v8
        with: { name: bin-armv7-unknown-linux-musleabihf, path: dist/linux/arm/v7 }
      - uses: actions/download-artifact@v8
        with: { name: bin-arm-unknown-linux-musleabihf, path: dist/linux/arm/v6 }

      - name: Mark binaries executable
        run: find dist -name zeronat -exec chmod +x {} +

      - uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/zeronat
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=raw,value=edge,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
