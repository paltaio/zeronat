name: znpppoe-image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "crates/znpppoe/**"
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/znpppoe.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/paltaio/znpppoe

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/znpppoe/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=znpppoe-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=znpppoe-${{ matrix.arch }}
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${{ steps.build.outputs.digest }}"
      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create -t ${{ env.IMAGE }}:latest \
            $(for d in sha256:*; do echo ${{ env.IMAGE }}@$d; done)
      - run: docker buildx imagetools inspect ${{ env.IMAGE }}:latest
