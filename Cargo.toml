[package]
name = "zeronat"
version = "0.2.0"
edition = "2021"
license = "MIT"

[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "io-util", "sync", "time", "signal"] }
clap = { version = "4", features = ["derive", "env"] }
snow = "0.9"
sha2 = "0.10"
anyhow = "1"
kcp = { version = "0.6", default-features = false }
getrandom = "~0.2"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
